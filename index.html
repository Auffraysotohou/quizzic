<title>QUIZZIC — Le quiz qui monte sur scène</title>

<meta name="theme-color" content="#14162b">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root{
    --bg: #14162b;
    --bg-deep: #0d0e1c;
    --gold: #e8b64d;
    --teal: #3ddc97;
    --pink: #ff4d6d;
    --ink: #f3f0ff;
    --ink-dim: #9a97c2;
    --panel: #1e2140;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Sora', sans-serif;
    background:
      radial-gradient(circle at 50% 0%, #2a2d55 0%, var(--bg) 45%, var(--bg-deep) 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
  }
  .stage{
    width:100%;
    max-width:440px;
    position:relative;
  }
  .spotlight{
    position:absolute;
    top:-160px; left:50%; transform:translateX(-50%);
    width:600px; height:600px;
    background:radial-gradient(circle, rgba(232,182,77,0.16) 0%, rgba(232,182,77,0) 60%);
    pointer-events:none;
    z-index:0;
  }
  .screen{ position:relative; z-index:1; display:none; }
  .screen.active{ display:block; animation:riseUp .5s ease; }
  @keyframes riseUp{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }

  /* HOME */
  .eyebrow{
    font-family:'Space Grotesk', sans-serif;
    letter-spacing:.35em;
    font-size:11px;
    color:var(--gold);
    text-align:center;
    margin-bottom:6px;
  }
  h1.logo{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:44px;
    text-align:center;
    margin:0 0 6px;
    letter-spacing:-0.02em;
    background:linear-gradient(180deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .tagline{
    text-align:center;
    color:var(--ink-dim);
    font-size:14px;
    margin-bottom:34px;
  }
  .cat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .cat-card{
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:16px;
    padding:18px 14px;
    cursor:pointer;
    text-align:left;
    transition:transform .15s ease, border-color .15s ease;
    color:var(--ink);
  }
  .cat-card:active{ transform:scale(0.96); }
  .cat-card .icon{ font-size:26px; display:block; margin-bottom:10px;}
  .cat-card .name{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:15px; display:block;}
  .cat-card .count{ color:var(--ink-dim); font-size:12px; margin-top:2px; display:block;}
  .cat-card .best{ color:var(--gold); font-size:11px; font-weight:700; margin-top:6px; display:block;}
  .mute-btn{
    position:absolute; top:0; right:0; z-index:2;
    background:var(--panel); border:1px solid rgba(255,255,255,0.08);
    color:var(--ink); width:38px; height:38px; border-radius:12px;
    font-size:16px; cursor:pointer;
  }
  .cat-card.c0{ border-color:rgba(232,182,77,.4); }
  .cat-card.c1{ border-color:rgba(61,220,151,.4); }
  .cat-card.c2{ border-color:rgba(255,77,109,.4); }
  .cat-card.c3{ border-color:rgba(122,162,255,.4); }
  .cat-card.c4{ border-color:rgba(200,120,255,.4); }

  /* QUIZ */
  .hud{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .hud .cat-label{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold);}
  .hud .score{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14px; background:var(--panel); padding:6px 12px; border-radius:20px;}
  .progress-track{ height:6px; background:var(--panel); border-radius:6px; overflow:hidden; margin-bottom:22px;}
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--teal), var(--gold)); border-radius:6px; transition:width .35s ease; }
  .timer-ring{ width:52px; height:52px; margin:0 auto 20px; position:relative; }
  .timer-ring svg{ transform:rotate(-90deg); width:100%; height:100%;}
  .timer-ring circle{ fill:none; stroke-width:5; }
  .timer-ring .track{ stroke:var(--panel); }
  .timer-ring .fill{ stroke:var(--gold); stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
  .timer-num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:16px;}
  .question{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:21px;
    line-height:1.35;
    margin-bottom:24px;
    min-height:80px;
  }
  .answers{ display:flex; flex-direction:column; gap:11px; }
  .answer{
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.08);
    color:var(--ink);
    padding:15px 16px;
    border-radius:13px;
    font-size:15px;
    font-family:'Sora', sans-serif;
    text-align:left;
    cursor:pointer;
    display:flex; align-items:center; gap:12px;
  }
  .answer .letter{
    width:26px; height:26px; border-radius:8px; background:rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:12px; flex-shrink:0;
  }
  .answer.correct{ background:rgba(61,220,151,0.18); border-color:var(--teal); }
  .answer.correct .letter{ background:var(--teal); color:#0d1a14; }
  .answer.wrong{ background:rgba(255,77,109,0.18); border-color:var(--pink); }
  .answer.wrong .letter{ background:var(--pink); color:#2a0d13;}
  .answer.disabled{ pointer-events:none; opacity:.6; }
  .answer.disabled.correct, .answer.disabled.wrong{ opacity:1; }

  /* RESULTS */
  .podium-badge{
    width:96px; height:96px; margin:0 auto 18px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:40px;
    background:conic-gradient(from 0deg, var(--gold), var(--teal), var(--pink), var(--gold));
    padding:4px;
  }
  .podium-badge span{
    width:100%; height:100%; border-radius:50%;
    background:var(--bg-deep);
    display:flex; align-items:center; justify-content:center;
  }
  .result-title{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:26px; text-align:center; margin-bottom:6px;}
  .result-sub{ text-align:center; color:var(--ink-dim); font-size:14px; margin-bottom:28px;}
  .stat-row{ display:flex; gap:12px; margin-bottom:28px;}
  .stat{ flex:1; background:var(--panel); border-radius:14px; padding:16px; text-align:center;}
  .stat .num{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px; color:var(--gold);}
  .stat .lbl{ font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.06em; margin-top:2px;}
  .btn{
    width:100%;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:15px;
    padding:16px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    text-align:center;
  }
  .btn-primary{ background:linear-gradient(90deg, var(--gold), #f4d58d); color:#241a04; margin-bottom:10px;}
  .btn-ghost{ background:transparent; color:var(--ink-dim); border:1px solid rgba(255,255,255,0.12);}
  .back-link{ display:block; text-align:center; color:var(--ink-dim); font-size:13px; margin-top:20px; cursor:pointer; text-decoration:underline;}
</style>

  </section>
</div>

let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, duration, type='sine'){
  if(muted) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function buildHome(){
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  Object.keys(DATA).forEach(name => {
    const cat = DATA[name];
    const card = document.createElement('button');
    card.className = 'cat-card ' + cat.color;
    const best = bestScores[name];
    const bestLine = best !== undefined ? `<span class="best">🏆 Meilleur : ${best}/${cat.questions.length}</span>` : '';
    card.innerHTML = `<span class="icon">${cat.icon}</span><span class="name">${name}</span><span class="count">${cat.questions.length} questions</span>${bestLine}`;
    card.onclick = () => startQuiz(name);
    grid.appendChild(card);
  });
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(catName){
  state.category = catName;
  state.order = [...DATA[catName].questions.keys()];
  state.index = 0;
  state.score = 0;
  state.streak = 0;
  state.maxStreak = 0;
  showScreen('screen-quiz');
  loadQuestion();
}

function restartSameCategory(){ startQuiz(state.category); }
function goHome(){ buildHome(); showScreen('screen-home'); }

function loadQuestion(){
  clearInterval(state.timer);
  const list = DATA[state.category].questions;
  if(state.index >= list.length){ return finishQuiz(); }
  const q = list[state.order[state.index]];
  document.getElementById('hud-cat').textContent = state.category;
  document.getElementById('hud-score').textContent = 'Score : ' + state.score;
  document.getElementById('progress-fill').style.width = ((state.index)/list.length*100) + '%';
  document.getElementById('question-text').textContent = q.q;

  const answersList = document.getElementById('answers-list');
  answersList.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${ans}</span>`;
    btn.onclick = () => selectAnswer(i, q.c);
    answersList.appendChild(btn);
  });

  state.timeLeft = QUESTION_TIME;
  updateTimerUI();
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerUI();
    if(state.timeLeft <= 3 && state.timeLeft > 0) playTickSound();
    if(state.timeLeft <= 0){
      clearInterval(state.timer);
      selectAnswer(-1, q.c);
    }
  }, 1000);
}

function updateTimerUI(){
  document.getElementById('timer-num').textContent = state.timeLeft;
  const offset = CIRC * (1 - state.timeLeft / QUESTION_TIME);
  document.getElementById('timer-circle').style.strokeDashoffset = offset;
}

function selectAnswer(chosen, correctIdx){
  clearInterval(state.timer);
  const buttons = document.querySelectorAll('.answer');
  buttons.forEach((b, i) => {
    b.classList.add('disabled');
    if(i === correctIdx) b.classList.add('correct');
    else if(i === chosen) b.classList.add('wrong');
  });

  if(chosen === correctIdx){
    state.score++;
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);
    playCorrectSound();
  } else {
    state.streak = 0;
    playWrongSound();
  }

  setTimeout(() => {
    state.index++;
    loadQuestion();
  }, 900);
}

function finishQuiz(){
  const list = DATA[state.category].questions;
  document.getElementById('progress-fill').style.width = '100%';
  const pct = state.score / list.length;
  let title, emoji, sub;
  if(pct === 1){ title="Sans-faute !"; emoji="🏆"; sub="Tu domines totalement cette catégorie."; }
  else if(pct >= 0.7){ title="Excellent !"; emoji="🥈"; sub="Tu es tout près du sans-faute."; }
  else if(pct >= 0.4){ title="Pas mal !"; emoji="🥉"; sub="Encore un effort pour monter sur la plus haute marche."; }
  else{ title="On retente ?"; emoji="🎯"; sub="Chaque épisode est une nouvelle chance."; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('stat-score').textContent = state.score;
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-streak').textContent = state.maxStreak;

  if(bestScores[state.category] === undefined || state.score > bestScores[state.category]){
    bestScores[state.category] = state.score;
    saveBestScores();
  }

  showScreen('screen-results');
}

buildHome();
</script>
</body>
</html>
